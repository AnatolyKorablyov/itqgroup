spring.application.name=itqgroup-service
logging.level.com.itqgroup.service=DEBUG
logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter=DEBUG

spring.jpa.generate-ddl=false
spring.jpa.hibernate.ddl-auto=none

postgres.schema=public
postgres.username=postgres
postgres.password=secret
postgres.host=postgres
postgres.custom.port=5432
postgres.database=itqgroup

spring.datasource.username=${postgres.username}
spring.datasource.password=${postgres.password}

application.limit.pageSize=10
application.generation.document.value=1000
application.worker.batch.size=10
application.worker.cron.expression=0 * * * * *
application.worker.enabled=false
application.service.url=http://127.0.0.1:8082
server.port=8082

spring.jpa.properties.javax.persistence.query.timeout=100